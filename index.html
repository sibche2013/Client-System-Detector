<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client System Environment & OS Device Detector</title>
    <meta name="description" content="Show Browser & OS Information Of Users System | نمایش نام مرورگر، نسخه، سیستم‌عامل و رزولوشن کاربر"/>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/vazirmatn-font-face.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

    <style>
        /* Developed by Amin Arjmand
        Site: aminarjmand.com | GitHub: @sibche2013 
        */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Vazirmatn', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 20px;
            color: #2c3e50;
        }

        .board {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(31, 38, 135, 0.06);
            width: 100%;
            max-width: 500px;
        }

        .title {
            font-size: 1.25rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
            color: #1a252f;
            border-bottom: 1px dashed rgba(0, 0, 0, 0.1);
            padding-bottom: 15px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.5);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .info-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(46, 204, 113, 0.15);
            color: #27ae60;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .info-body {
            flex-grow: 1;
            font-size: 0.95rem;
        }

        .info-label {
            font-size: 0.8rem;
            color: #7f8c8d;
            font-weight: 500;
            text-transform: uppercase;
        }

        .info-value {
            font-weight: 600;
            color: #2c3e50;
            margin-top: 2px;
        }

        .badge-device {
            display: inline-block;
            margin-top: 5px;
            padding: 6px 16px;
            background: #2ecc71;
            color: white;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.2);
        }

        .button {
            font-family: inherit;
            font-size: 0.9rem;
            padding: 12px 28px;
            background: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 30px;
            color: #555555;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.04);
        }

        .button:hover {
            background: #2ecc71;
            color: #ffffff;
            border-color: #2ecc71;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="board">
    <h2 class="title">System Environment Info</h2>
    
    <div class="info-row">
        <div class="info-icon">💻</div>
        <div class="info-body">
            <div class="info-label">Operating System</div>
            <div class="info-value" id="os-info">Detecting...</div>
        </div>
    </div>

    <div class="info-row">
        <div class="info-icon">🌐</div>
        <div class="info-body">
            <div class="info-label">Browser & Version</div>
            <div class="info-value" id="browser-info">Detecting...</div>
        </div>
    </div>

    <div class="info-row">
        <div class="info-icon">🖥️</div>
        <div class="info-body">
            <div class="info-label">Screen Resolution</div>
            <div class="info-value" id="screen-info">Detecting...</div>
        </div>
    </div>

    <div class="info-row">
        <div class="info-icon">⚡</div>
        <div class="info-body">
            <div class="info-label">Network Status</div>
            <div class="info-value" id="network-info">Detecting...</div>
        </div>
    </div>

    <div class="info-row">
        <div class="info-icon">🔋</div>
        <div class="info-body">
            <div class="info-label">Battery Level</div>
            <div class="info-value" id="battery-info">Detecting...</div>
        </div>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <span id="device-badge" class="badge-device">Detecting Platform...</span>
    </div>
</div>

<button class="button" onclick="history.back();">← Back To Previous Page</button>

<script src="Browser&OsDetection.js"></script>
</body>
</html>
